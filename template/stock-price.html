<!DOCTYPE html>
<html>
  <head>
    <title>韭菜盒子</title>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"

    <link
      href="https://cdn.bootcdn.net/ajax/libs/element-ui/2.9.2/theme-chalk/index.css"
      rel="stylesheet"

    <style>
      body,
      html {
        height: 100%;
        -webkit-tap-highlight-color: transparent;
      }

      div {
        margin-left: 10px;
        line-height: 28px;
      }
      .list {
        margin-left: 0;
        width: 100%;
        box-sizing: border-box;
      }
      .search-bar {
        margin-left: 0;
        margin-bottom: 12px;
        width: 100%;
        box-sizing: border-box;
        padding: 12px 8px 12px 0;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 100;
        background-color: var(--vscode-editor-background);
      }
      .search-box {
        margin-left: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .search-input {
        width: 180px;
      }
      .search-count {
        font-size: 12px;
        min-width: 58px;
        text-align: center;
      }
      .el-button + .el-button {
        margin-left: 0;
      }
      .search-btn {
        padding: 2px 6px;
        line-height: 16px;
      }
      .search-btn.is-disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .search-hit {
        background-color: #fdf6ec;
        color: #e6a23c;
        border-radius: 2px;
        padding: 0 1px;
      }
      .search-hit-active {
        background-color: #f56c6c;
        color: #ffffff;
      }
      .item.search-item-active {
        border-color: #409eff;
      }
      .list .name,
      .amount {
        display: inline-block;
      }
      .unit {
        float: right;
      }
      .amount {
        float: right;
        width: 190px !important;
      }
      .name {
        font-size: 14px;
        margin-left: 0;
      }
      .item {
        margin-top: 0;
        margin-left: 0;
        padding: 10px 8px;
        width: 100%;
        box-sizing: border-box;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        border: 1px solid transparent;
        scroll-margin-top: 72px;
        border-radius: 8px;
      }
      .item-left {
        margin-left: 0;
        display: flex;
        flex-direction: column;
        flex: 0 1 auto;
        min-width: 0;
        max-width: 480px;
      }
      .meta {
        margin-left: 0;
        font-size: 12px;
        color: #909399;
        line-height: 1;
      }
      .meta-sep {
        margin: 0 4px;
      }
      .item-right {
        margin-left: auto;
        display: flex;
        flex-direction: row-reverse;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        /* flex: 1 1 auto; */
        min-width: 0;
      }
      .item-right .amount {
        float: none;
        width: 190px !important;
      }
      .item-right .unitDiv {
        float: none;
        width: 224px;
      }
      .item-right .sellOut {
        margin-left: 0;
        float: none;
        flex-shrink: 0;
      }
      .item div,
      .search-bar div {
        margin-left: 0;
      }
      .el-input {
        width: 160px;
        height: 28px;
      }
      .el-checkbox {
        width: 24px;
        height: 24px;
        margin-right: 0 !important;
      }
      .el-input__inner {
        height: 28px;
        width: 120px;
        background-color: #eee;
      }
      .el-input__inner.search-input {
        width: 200px;
      }
      .main {
        margin: 0 auto;
        width: 980px;
        padding: 32px;
      }
      .footer {
        width: 560px;
        margin: 30px auto 10px auto;
        text-align: center;
      }
      .footer .info {
        font-size: 16px;
        margin-top: 20px;
        color: #696666;
      }
      .operate {
        font-size: 12px;
      }
      .sellOut {
        width: 80px;
        height: 28px;
        margin-left: 0;
        float: right;
      }
      .unitDiv {
        width: 224px;
        float: right;
      }
      .unitPriceInput {
        width: 100px;
      }
      .red {
        color: #f56c6c;
      }
      .green {
        color: green;
      }
      .html2canvas-container {
        position: fixed;
        left: -2000;
        top: 1000;
        margin-top: 200px;
        background-color: #303133;
      }
      .imgHACK {
        display: none;
      }

      .main-canvas {
        width: 1000px;
        background-color: #303133;
      }
      .qr {
        margin: 10px auto;
        width: 120px;
      }
      body.vscode-light .search-count,
      body.vscode-light .meta {
        color: #606266;
      }
      body.vscode-light .search-hit {
        background-color: #fdf6ec;
        color: #e6a23c;
      }
      body.vscode-dark .search-count,
      body.vscode-dark .meta {
        color: #a6a9ad;
      }
      body.vscode-dark .el-input__inner {
        background-color: #2b2b2b;
        border-color: #4c4d4f;
        color: #e5eaf3;
      }
      body.vscode-dark .search-hit {
        background-color: #2b2b2b;
        color: #e6a23c;
      }
    </style>

    <div class="main">

      <!-- <p style="font-size: 12px; color: #696666; text-align: center">

      <div class="search-bar">

    <script src="https://cdn.staticfile.org/jquery/2.0.0/jquery.min.js"></script>

    <script src="vendors/toastify.js"></script>

    <script>
      const vscode = acquireVsCodeApi();
      const deviceId =
        Math.random().toString(16).substr(2) +
        Math.random().toString(32).substr(2);

      let sortType = 'default';
      const list = $('.list');
      let fundList = [];
      let priceDate = new Date().toDateString();
      let searchMatches = [];
      let activeMatchIndex = -1;
      let applySearch = function () {};
      (function installSearchBeforeInit() {
        function escapeRegExp(str) {
          return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function resetSearchHighlights() {
          $('.list .item-left .name').each(function () {
            const origin = $(this).attr('data-origin-name');
            if (origin !== undefined) {
              $(this).text(origin);
            }
          });
          $('.list .item-left .fund-code').each(function () {
            const origin = $(this).attr('data-origin-code');
            if (origin !== undefined) {
              $(this).text(origin);
            }
          });
          $('.search-item-active').removeClass('search-item-active');
          $('.search-hit-active').removeClass('search-hit-active');
        }

        function updateSearchCount() {
          const searchCount = $('#searchCount');
          const searchPrev = $('#searchPrev');
          const searchNext = $('#searchNext');
          const current = searchMatches.length ? activeMatchIndex + 1 : 0;
          searchCount.text(current + ' / ' + searchMatches.length);
          const disabledClass = 'is-disabled';
          if (searchMatches.length === 0) {
            searchPrev.addClass(disabledClass);
            searchNext.addClass(disabledClass);
          } else {
            searchPrev.removeClass(disabledClass);
            searchNext.removeClass(disabledClass);
          }
        }

        function scrollToActiveMatch() {
          if (
            activeMatchIndex < 0 ||
            activeMatchIndex >= searchMatches.length
          ) {
            return;
          }
          const $target = searchMatches[activeMatchIndex];
          if (!$target || !$target.length) {
            return;
          }
          const hitEl = $target[0];
          const itemEl =
            hitEl && typeof hitEl.closest === 'function'
              ? hitEl.closest('.item')
              : null;
          if (!itemEl) {
            return;
          }
          const $item = $(itemEl);
          $item.addClass('search-item-active');
          $target.addClass('search-hit-active');
          try {
            itemEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
          } catch (e) {
            try {
              itemEl.scrollIntoView();
            } catch (e2) {}
          }
        }

        function collectSearchMatches() {
          searchMatches = [];
          $('.list .search-hit').each(function () {
            searchMatches.push($(this));
          });
        }

        function highlightTextByKeyword(text, keyword) {
          if (!keyword) return text;
          const regex = new RegExp(escapeRegExp(keyword), 'ig');
          return text.replace(regex, '<span class="search-hit">$&</span>');
        }

        applySearch = function () {
          const searchInput = $('#searchInput');
          const keyword = (searchInput.val() || '').trim();
          resetSearchHighlights();
          activeMatchIndex = -1;

          $('.list .item-left').each(function () {
            const nameEl = $(this).find('.name');
            const codeEl = $(this).find('.fund-code');
            const nameText = nameEl.attr('data-origin-name') || nameEl.text();
            const codeText = codeEl.attr('data-origin-code') || codeEl.text();
            nameEl.attr('data-origin-name', nameText);
            codeEl.attr('data-origin-code', codeText);
            if (!keyword) {
              nameEl.text(nameText);
              codeEl.text(codeText);
              return;
            }
            nameEl.html(highlightTextByKeyword(nameText, keyword));
            codeEl.html(highlightTextByKeyword(codeText, keyword));
          });

          collectSearchMatches();
          if (searchMatches.length > 0) {
            activeMatchIndex = 0;
            scrollToActiveMatch();
          }
          updateSearchCount();
        };

        function navigateSearch(step) {
          if (searchMatches.length === 0) return;
          $('.search-item-active').removeClass('search-item-active');
          $('.search-hit-active').removeClass('search-hit-active');
          activeMatchIndex =
            (activeMatchIndex + step + searchMatches.length) %
            searchMatches.length;
          scrollToActiveMatch();
          updateSearchCount();
        }

        $('#searchInput').on('input', function () {
          applySearch();
        });
        $('#searchPrev').on('click', function () {
          navigateSearch(-1);
        });
        $('#searchNext').on('click', function () {
          navigateSearch(1);
        });
        $('#searchClose').on('click', function () {
          $('#searchInput').val('');
          applySearch();
        });
      })();

      window.addEventListener('message', (event) => {
        const msg = event.data;

        switch (msg.command) {
          case 'init':
            sortType = msg.sortType || 'default';
            dateStr = msg.dateStr; // 懒得再写格式化日期
            init(msg.data);
            Toastify({
              text: '数据已刷新！',
              duration: 1000,
            }).showToast();
            break;
        }
      });

      function init(data) {
        // const fundList = ${JSON.stringify(list)};
        if (sortType !== 'default') {
          fundList = data.sort((a, b) => {
            const ae = a.earningPercent || 0;
            const be = b.earningPercent || 0;
            return sortType === 'earningsDesc' ? be - ae : ae - be;
          });
        } else {
          fundList = data;
        }
        // console.log(fundList);

        init2();
      }

      function init2() {
        let listStr = '';
        let totalMoney = 0;
        let totalEarnings = 0;
        fundList.forEach((item, index) => {
          const amount = item.amount || 0;
          const unitPrice = item.unitPrice || 0;
          const earningPercent = item.earningPercent || 0;
          const todayUnitPrice = item.todayUnitPrice || 0;
          const isSellOut = item.isSellOut || false;
          if (index === 0) {
            priceDate = item.priceDate;
          }
          if (!priceDate) {
            priceDate = item.priceDate;
          }
          const str =
            '<div class="item">' +
            '<div class="item-left" data-name="' +
            item.name +
            '" data-code="' +
            item.code +
            '">' +
            '<div class="name">' +
            item.name +
            '</div>' +
            '<div class="meta">' +
            '<span class="fund-code">' +
            item.code +
            '</span><span class="meta-sep">|</span><i class="' +
            (earningPercent > 0 ? 'red' : 'green') +
            '">' +
            earningPercent +
            '%</i>' +
            '</div>' +
            '</div>' +
            '<div class="item-right">' +
            '<div class="amount el-input">' +
            '持仓股数：<input type="number" class="amountInput el-input__inner" id="' +
            item.code +
            '" value="' +
            amount +
            '" /> </div>' +
            '<div class="unitDiv el-input">' +
            '持仓成本价：<input type="number" class="unitPriceInput el-input__inner" id="' +
            item.code +
            '_unit" value="' +
            unitPrice +
            '" /> <span class="unit">元、</span> </div>' +
            '<div class="unitDiv el-input">' +
            '今日成本价：<input type="number" class="unitPriceInput el-input__inner" id="' +
            item.code +
            '_today_unit" value="' +
            todayUnitPrice +
            '" /> <span class="unit">元、</span> </div>' +
            '<div class="sellOut">' +
            '<input type="checkbox" id="' +
            item.code +
            '_sell_out" class="el-checkbox" ' +
            (isSellOut ? 'checked' : '') +
            ' /><span class="unit">已清仓</span>' +
            '</div>' +
            '</div>' +
            '</div>';

          listStr += str;
          const earnings = item.earnings || 0;

          totalMoney += amount;
          totalEarnings += earnings;
        });
        list.html(listStr);
        $('#totalMoney').html(totalMoney.toFixed(2));
        applySearch();
        // $('#priceDate').html(priceDate || '');
        // 收益统计
        if (totalEarnings !== 0) {
          const color = totalEarnings > 0 ? '#f55151' : 'green';
          let str =
            priceDate +
            ' 估算收益为： <span style="font-size:20px;color:' +
            color +
            '">' +
            totalEarnings.toFixed(2) +
            '</span> 元，' +
            (totalEarnings > 0
              ? '继续加油💪！'
              : '在A股，守住才会有收益，加油💪');
          if (totalEarnings >= 666) {
            str +=
              '<span class="rm">&nbsp;恭喜吃肉，老板 <span style="color:#409EFF;cursor:pointer" id="donate">💰打赏</span> 一下！</span>';
          }

          $('.footer .info').html(str);

          $('#donate').click(function () {
            vscode.postMessage({
              command: 'donate',
              text: '打赏',
            });
          });

          $('.text2image').click((evt) => {
            const type = evt.target.getAttribute('data-type') || 'all';
            vscode.postMessage({
              command: 'telemetry',
              type,
            });

            let selector = type === 'shouyi' ? '.footer' : '.main';

            $('.main-canvas').html($(selector).html());
            const canvasEl = $('.main-canvas');
            canvasEl.find('.rm').hide();
            canvasEl.find('.qr').show();
            canvasEl
              .find('.amount')
              .map((i, el) => (el.innerText = '持仓金额：*** 元'));
            canvasEl.find('#totalMoney').html('*** 元');

            const targetDom = canvasEl[0];
            const paintCanvas = document.getElementById('paint');
            const paintCtx = paintCanvas.getContext('2d');
            const scale = 2;
            const qrImageWidth = 240;
            const qrImageHeight = 310;
            // 自定义绘制
            if (type === 'shouyi') {
              paintCanvas.height = qrImageHeight / 2;
              paintCanvas.width = qrImageWidth * scale;
              paintCtx.fillStyle = '#303133';
              paintCtx.fillRect(0, 0, paintCanvas.width, paintCanvas.height);

              const earnningTxt = totalEarnings.toFixed(2);
              const title = '今日收益';
              paintCtx.fillStyle = '#409eff';
              canvasTxt.fontSize = 20;
              canvasTxt.lineHeight = 20;
              canvasTxt.align = 'left';
              canvasTxt.drawText(paintCtx, title, 100, 10, 120, 40);
              canvasTxt.drawText(
                paintCtx,
                Number(earnningTxt) < 0 ? '🍜' : '🍗',
                184,
                10,
                120,
                40
              );
              paintCtx.fillStyle =
                Number(earnningTxt) < 0 ? 'green' : '#f55151';
              canvasTxt.fontSize = Number(earnningTxt) > 10000 ? 30 : 40;
              // canvasTxt.lineHeight = 20;
              canvasTxt.drawText(
                paintCtx,
                earnningTxt + '元',
                100,
                50,
                200,
                80
              );
              canvasTxt.fontSize = 10;
              paintCtx.fillStyle = 'gray';
              canvasTxt.drawText(paintCtx, priceDate, 100, 120, 100, 40);

              paintCtx.drawImage(
                $('.imgHACK>img')[0],
                paintCanvas.width - qrImageWidth / 2,
                0,
                qrImageWidth / 2,
                qrImageHeight / 2
              );
              return copyImageToClipboard(paintCanvas);
            }
            // html截图
            html2canvas(targetDom, {
              dpi: window.devicePixelRatio * 3,
              scale,
              height: targetDom.offsetHeight,
              width: targetDom.offsetWidth,
              scrollY: 0, // 解决偏移问题
            }).then((htmlcanvas) => {
              paintCanvas.height =
                targetDom.offsetHeight * scale + qrImageHeight;
              paintCanvas.width = targetDom.offsetWidth * scale;
              paintCtx.fillStyle = '#303133';
              paintCtx.fillRect(0, 0, paintCanvas.width, paintCanvas.height);
              paintCtx.drawImage(
                htmlcanvas,
                0,
                10,
                htmlcanvas.width,
                htmlcanvas.height
              );
              const imageOffsetWidth = paintCanvas.width / 2 - qrImageWidth / 2;
              const imageOffsetHeight = paintCanvas.height - qrImageHeight + 8;
              paintCtx.drawImage(
                $('.imgHACK>img')[0],
                imageOffsetWidth,
                imageOffsetHeight,
                qrImageWidth,
                qrImageHeight
              );
              canvasTxt.fontSize = 20;
              paintCtx.fillStyle = 'gray';
              canvasTxt.drawText(
                paintCtx,
                priceDate,
                imageOffsetWidth - 200,
                imageOffsetHeight + 100,
                150,
                80
              );

              copyImageToClipboard(paintCanvas);
              /*  if (document.body.querySelector('canvas')) {
                document.body.querySelector('canvas').remove();
                document.body.appendChild(paintCanvas);
              } */
            });
          });
        }
      }

      function copyImageToClipboard(canvas) {
        const base64Data = canvas
          .toDataURL('image/png')
          .replace('data:image/png;base64,', '');
        if (base64Data && base64Data.length < 100) {
          Toastify({
            text: '生成图片失败！',
            duration: 2000,
            backgroundColor: '#f56c6c',
            gravity: 'bottom',
          }).showToast();
          return;
        }
        const blobInput = convertBase64ToBlob(base64Data, 'image/png');
        const clipboardItemInput = new ClipboardItem({
          'image/png': blobInput,
        });
        navigator.clipboard.write([clipboardItemInput]);
        Toastify({
          text: '复制图片成功，可以去粘贴发送分享了！',
          duration: 2500,
          backgroundColor: 'linear-gradient(to right, #00b09b, #96c93d)',
          gravity: 'bottom',
        }).showToast();
      }

      $(function () {
        $('.amountInput,.unitPriceInput').on('input', function (e) {
          const value = e.target.value;
          if (value.length > 12) {
            e.target.value = value.slice(0, 12);
          }
        });
        $('#save').click(() => {
          // const ammountObj = {};
          let totalMoney = 0;
          fundList.forEach((item) => {
            let amount = $('#' + item.code).val();
            let unitPrice = $('#' + item.code + '_unit').val();
            let todayUnitPrice = $('#' + item.code + '_today_unit').val();
            let isSellOut = $('#' + item.code + '_sell_out').prop('checked');
            amount = isNaN(Number(amount)) ? 0 : Number(amount);
            unitPrice = isNaN(Number(unitPrice)) ? 0 : Number(unitPrice);
            todayUnitPrice = isNaN(Number(todayUnitPrice)) ? 0 : Number(todayUnitPrice);
            item.amount = amount; // 持仓金额
            item.unitPrice = unitPrice; // 成本价
            item.todayUnitPrice = todayUnitPrice; // 今日成本价
            item.isSellOut = isSellOut; // 是否清仓
            totalMoney += amount; // 持仓金额
            // 收益率
            if (unitPrice !== 0) {
              profitPercent = ((item.price - unitPrice) / unitPrice) * 100;
              item.earningPercent = profitPercent.toFixed(2);
            } else {
              item.earningPercent = 0;
            }

            // if (typeof ammountObj[item.code] !== 'object') {
            //   ammountObj[item.code] = {};
            // }
            // ammountObj[item.code].amount = amount;
            // ammountObj[item.code].unitPrice = unitPrice;
            // const earnings = item.earnings || 0;
            // ammountObj[item.code].earnings = earnings;
          });
          $('#totalMoney').html(totalMoney.toFixed(2));
          init2();
          vscode.postMessage({
            command: 'success',
            text: JSON.stringify(fundList),
          });
          return;

          fetchInfo(fundList, ({ Expansion = {}, Datas = [] }) => {
            const dates = [
              Expansion?.FSRQ?.substr?.(5, 5),
              Expansion?.GZTIME?.substr?.(5, 5),
            ];
            const result = [];
            totalMoney = 0;
            Datas.forEach((item) => {
              const amount = ammountObj[item.FCODE].amount;
              const unitPrice = ammountObj[item.FCODE].unitPrice;
              const todayUnitPrice = ammountObj[item.FCODE].todayUnitPrice;
              const isSellOut = ammountObj[item.FCODE].isSellOut;
              const obj = {
                code: item.FCODE,
                name: item.SHORTNAME,
                unitPrice: unitPrice, // 成本价
                amount: amount, // 持仓金额
                todayUnitPrice: todayUnitPrice, // 今日成本价
                isSellOut: isSellOut, // 是否清仓
                earnings: ammountObj[item.FCODE].earnings,
                price: item.NAV, // 净值
                priceDate: item.PDATE, // 净值时间
                isUpdated: item.PDATE.substr(5, 5) === item.GZTIME.substr(5, 5),
              };
              totalMoney += amount;
              result.push(obj);
            });
            $('#totalMoney').html(totalMoney.toFixed(2));
            // 和 vscode webview 通信
            vscode.postMessage({
              command: 'success',
              text: JSON.stringify(result),
            });
          });
        });

        $('#refresh').click(() => {
          vscode.postMessage({
            command: 'refresh',
            sortType,
          });
        });
        $('#sort').click(() => {
          sortType =
            sortType === 'earningsDesc' ? 'earningsAsc' : 'earningsDesc';
          vscode.postMessage({
            command: 'refresh',
            sortType,
          });
        });
      });

      function fetchInfo(fundList, cb) {
        const params = {
          pageIndex: 1,
          pageSize: fundList.length,
          plat: 'Android',
          appType: 'ttjj',
          product: 'EFund',
          Version: 1,
          deviceid: deviceId,
          Fcodes: fundList
            .reduce((arr, item) => [...arr, item.code], [])
            .join(','),
        };
        if (!params.deviceid || !params.Fcodes) return;

        const paramsArr = [];
        for (let key in params) {
          if (key && params[key]) {
            paramsArr.push(key + '=' + params[key]);
          }
        }

        window
          .fetch(
            'https://fundmobapi.eastmoney.com/FundMNewApi/FundMNFInfo?' +
              paramsArr.join('&')
          )
          .then((res) => {
            if (res.status !== 200) {
              // console.log('获取数据失败');
              vscode.postMessage({
                command: 'alert',
                text: '获取数据失败',
              });
              return;
            }
            res.json().then(function (d) {
              cb(d);
            });
          });
      }

      function convertBase64ToBlob(base64, type) {
        var bytes = window.atob(base64);
        var ab = new ArrayBuffer(bytes.length);
        var ia = new Uint8Array(ab);
        for (var i = 0; i < bytes.length; i++) {
          ia[i] = bytes.charCodeAt(i);
        }
        return new Blob([ab], { type: type });
      }

      vscode.postMessage({
        command: 'refresh',
      });
    </script>
